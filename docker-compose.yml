services:
  postgres:
    image: postgres:18-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: staking
      POSTGRES_PASSWORD: staking
      POSTGRES_DB: staking
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U staking"]
      interval: 5s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    entrypoint: ["anvil", "--host", "0.0.0.0", "--block-time", "2"]
    ports:
      - "8545:8545"

  solana-validator:
    image: solanalabs/solana:v1.18.26
    entrypoint: ["solana-test-validator", "--bind-address", "0.0.0.0", "--rpc-port", "8899"]
    ports:
      - "8899:8899"
      - "8900:8900"

volumes:
  pgdata:
